{% extends 'app/base.html' %}
{% block title %}Laptop{% endblock title %}
{% block main-content %}

<div class="container my-5">
 <div class="row">
  <div class="col-sm-3">
   <div class="list-group">
     <a href="{% url 'laptop' %}" class="list-group-item list-group-item-action">All Laptop</a>
     <a href="{% url 'laptopdata' 'below' %}" class="list-group-item list-group-item-action">Below 50000</a>
     <a href="{% url 'laptopdata' 'above' %}" class="list-group-item list-group-item-action">Above 50000</a>
   </div>
  </div>

  <div class="col-sm-8">
   <div class="row">
    {% for product in laptops %}
     <div class="col-sm-4 text-center mb-4">
      <a href="{% url 'product-detail' product.id %}" class="btn">
        <img src="{{product.product_image.url}}" class="img-fluid product-img">
        <div class="fw-bold">{{product.title}}</div>
        <div class="fw-bold">
            Rs. {{product.discounted_price}}
            <small class="text-decoration-line-through">{{product.selling_price}}</small>
        </div>
      </a>
     </div>
    {% endfor %}
   </div>
  </div>
 </div>
</div>

{% endblock main-content %}
